name: Paper Build

on:
  push:
    branches: ["main", "master"]
    paths:
      - "viscachepaper/**"
      - "paper/**"
      - ".github/workflows/paper.yml"
  pull_request:
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  build-paper:
    name: Build Paper PDF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install reportlab

      - name: Generate paper PDF
        run: python viscachepaper/generate_paper.py viscachepaper/paper-draft.pdf

      - name: Upload paper PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper-draft
          path: viscachepaper/paper-draft.pdf
          retention-days: 90

      - name: Job summary
        run: |
          SIZE=$(ls -lh viscachepaper/paper-draft.pdf | awk '{print $5}')
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          echo "## Paper Draft" >> $GITHUB_STEP_SUMMARY
          echo "Built successfully (${SIZE})." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[Download PDF](${RUN_URL}#artifacts)" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `**Paper draft built** — [download PDF](${runUrl}#artifacts)`;
            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('**Paper draft built**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

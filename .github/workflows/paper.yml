name: Paper PDF

on:
  push:
    branches: ["main", "master"]
    paths:
      - 'viscachepaper/**'
      - '.github/workflows/paper.yml'
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: paper-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Fast check — always visible in PR, skips build if no paper changes
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      paper: ${{ steps.filter.outputs.paper }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            paper:
              - 'viscachepaper/**'
              - '.github/workflows/paper.yml'

  paper:
    name: Build Paper PDF
    needs: [changes]
    if: always() && (needs.changes.outputs.paper == 'true' || github.event_name != 'pull_request')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install reportlab

      - name: Generate paper PDF
        run: python viscachepaper/generate_paper.py viscachepaper/paper-draft.pdf

      - name: Prepare Pages artifact
        run: |
          SIZE=$(ls -lh viscachepaper/paper-draft.pdf | awk '{print $5}')
          echo "PDF_SIZE=${SIZE}" >> $GITHUB_ENV

          mkdir -p _site/latest
          cp viscachepaper/paper-draft.pdf _site/latest/paper-draft.pdf
          cp viscachepaper/paper-draft.pdf _site/paper-draft.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Job summary
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          echo "## Paper Draft" >> $GITHUB_STEP_SUMMARY
          echo "Built successfully (${PDF_SIZE})." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [Latest PDF](${PAGES_URL}/latest/paper-draft.pdf)" >> $GITHUB_STEP_SUMMARY
          echo "- [Stable PDF (main)](${PAGES_URL}/paper-draft.pdf)" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pagesUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}`;
            const body = `**Paper draft built** (${process.env.PDF_SIZE}) — [download PDF](${pagesUrl}/latest/paper-draft.pdf)`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('**Paper draft built**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  deploy:
    name: Deploy to GitHub Pages
    needs: paper
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

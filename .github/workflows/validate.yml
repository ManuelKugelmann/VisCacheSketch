name: Algorithm Validation

on:
  push:
    branches: ["main", "master"]
    paths:
      - 'tests/**'
      - 'Source/RenderPasses/**'
      - '.github/workflows/validate.yml'
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: validate-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Fast check — always visible in PR, skips tests if no relevant changes
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      algo: ${{ steps.filter.outputs.algo }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            algo:
              - 'tests/**'
              - 'Source/RenderPasses/**'
              - '.github/workflows/validate.yml'

  algorithm-validations:
    name: Algorithm Validations
    needs: [changes]
    if: always() && (needs.changes.outputs.algo == 'true' || github.event_name != 'pull_request')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run VisCache algorithm validations
        run: python tests/test_viscache_convergence.py

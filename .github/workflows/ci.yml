name: CI

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

# Cancel redundant builds on the same branch/PR
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FALCOR_DIR: external/Falcor

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests (no GPU required)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run VHF convergence tests
        run: python tests/test_vhf_convergence.py

  # ---------------------------------------------------------------------------
  # Linux/GCC — vanilla Falcor + MLVHF plugins
  # ---------------------------------------------------------------------------
  linux-gcc:
    name: Linux/GCC (${{ matrix.config }})
    runs-on: ubuntu-22.04
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        config: [Release, Debug]
    env:
      CMAKE_BUILD_PRESET: linux-gcc-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -- Caching: Falcor internal submodules (static key, source-only) ------
      - name: Cache Falcor submodules
        uses: actions/cache@v4
        with:
          path: |
            external/Falcor/external/pybind11
            external/Falcor/external/glfw
            external/Falcor/external/args
            external/Falcor/external/fmt
            external/Falcor/external/imgui
            external/Falcor/external/vulkan-headers
          key: falcor-submodules-${{ runner.os }}-v1

      - name: Init Falcor submodules
        run: |
          cd ${{ env.FALCOR_DIR }}
          # Falcor was added as a subtree — submodule refs don't survive
          # subtree squash, so we shallow-clone them if they're missing.
          for mod in pybind11:https://github.com/skallweitNV/pybind11.git \
                     glfw:https://github.com/glfw/glfw.git \
                     args:https://github.com/Taywee/args.git \
                     fmt:https://github.com/fmtlib/fmt.git \
                     imgui:https://github.com/ocornut/imgui.git \
                     vulkan-headers:https://github.com/KhronosGroup/Vulkan-Headers.git; do
            dir="external/${mod%%:*}"
            url="${mod#*:}"
            if [ ! -f "$dir/CMakeLists.txt" ] && [ ! -f "$dir/imgui.h" ]; then
              echo "Cloning $url -> $dir"
              rm -rf "$dir"
              git clone --depth 1 "$url" "$dir"
            fi
          done

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xorg-dev libgtk-3-dev ccache

      # -- Caching: ccache for compiled objects ----------------------------------
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-gcc-${{ matrix.config }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-gcc-${{ matrix.config }}-
            ccache-${{ runner.os }}-gcc-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=1G
          ccache --set-config=compression=true
          ccache -z

      # -- Caching: NVIDIA packman packages (keyed on dependencies.xml) -------
      - name: Cache packman packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/packman
          key: packman-${{ runner.os }}-${{ hashFiles('external/Falcor/dependencies.xml') }}
          restore-keys: packman-${{ runner.os }}-

      - name: Fetch Falcor packman dependencies
        run: |
          cd ${{ env.FALCOR_DIR }}
          chmod +x tools/packman/packman
          ./tools/packman/packman pull --platform linux-x86_64 dependencies.xml

      - name: Patch NVTT package
        run: |
          cd ${{ env.FALCOR_DIR }}
          # Falcor's setup.sh creates this symlink; packman ships libnvtt.so.30106
          # but the CMake build expects libnvtt.so
          cp -fp external/packman/nvtt/libnvtt.so.30106 external/packman/nvtt/libnvtt.so

      - name: Integrate MLVHF plugins into Falcor tree
        run: |
          FALCOR="${{ env.FALCOR_DIR }}"

          # Copy VisHashFilter plugin
          mkdir -p "${FALCOR}/Source/RenderPasses/VisHashFilter"
          cp -r Source/RenderPasses/VisHashFilter/* "${FALCOR}/Source/RenderPasses/VisHashFilter/"

          # Copy ReSTIRGIPass plugin
          mkdir -p "${FALCOR}/Source/RenderPasses/ReSTIRGIPass"
          cp -r Source/RenderPasses/ReSTIRGIPass/* "${FALCOR}/Source/RenderPasses/ReSTIRGIPass/"

          # Copy scripts
          mkdir -p "${FALCOR}/scripts/MLVHF"
          cp -r scripts/* "${FALCOR}/scripts/MLVHF/"

          # Patch RenderPasses CMakeLists.txt to register plugins
          RP_CMAKE="${FALCOR}/Source/RenderPasses/CMakeLists.txt"
          if ! grep -q "add_subdirectory(VisHashFilter)" "$RP_CMAKE"; then
            echo "add_subdirectory(VisHashFilter)" >> "$RP_CMAKE"
          fi
          if ! grep -q "add_subdirectory(ReSTIRGIPass)" "$RP_CMAKE"; then
            echo "add_subdirectory(ReSTIRGIPass)" >> "$RP_CMAKE"
          fi

          echo "--- Patched RenderPasses CMakeLists.txt ---"
          cat "$RP_CMAKE"

      - name: CMake Configure
        run: |
          cd ${{ env.FALCOR_DIR }}
          ./tools/.packman/cmake/bin/cmake --preset ${{ env.CMAKE_BUILD_PRESET }} \
            -DFALCOR_VALIDATE_HEADERS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: |
          cd ${{ env.FALCOR_DIR }}
          ./tools/.packman/cmake/bin/cmake --build build/${{ env.CMAKE_BUILD_PRESET }} --config ${{ matrix.config }} -j $(nproc)

      - name: Print ccache stats
        if: always()
        run: ccache -s

      - name: Upload build artifacts
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: falcor-linux-gcc-${{ matrix.config }}
          path: |
            ${{ env.FALCOR_DIR }}/build/${{ env.CMAKE_BUILD_PRESET }}/bin/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Windows/VS2022 — vanilla Falcor + MLVHF plugins
  # ---------------------------------------------------------------------------
  windows-vs2022:
    name: Windows VS2022 (${{ matrix.config }})
    runs-on: windows-2022
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        config: [Release, Debug]
    env:
      CMAKE_BUILD_PRESET: windows-vs2022-ci
      # Pin packman cache location for reproducible caching on Windows
      PM_PACKAGES_ROOT: C:\packman-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -- Caching: Falcor internal submodules --------------------------------
      - name: Cache Falcor submodules
        uses: actions/cache@v4
        with:
          path: |
            external/Falcor/external/pybind11
            external/Falcor/external/glfw
            external/Falcor/external/args
            external/Falcor/external/fmt
            external/Falcor/external/imgui
            external/Falcor/external/vulkan-headers
          key: falcor-submodules-${{ runner.os }}-v1

      - name: Init Falcor submodules
        shell: bash
        run: |
          cd ${{ env.FALCOR_DIR }}
          for mod in pybind11:https://github.com/skallweitNV/pybind11.git \
                     glfw:https://github.com/glfw/glfw.git \
                     args:https://github.com/Taywee/args.git \
                     fmt:https://github.com/fmtlib/fmt.git \
                     imgui:https://github.com/ocornut/imgui.git \
                     vulkan-headers:https://github.com/KhronosGroup/Vulkan-Headers.git; do
            dir="external/${mod%%:*}"
            url="${mod#*:}"
            if [ ! -f "$dir/CMakeLists.txt" ] && [ ! -f "$dir/imgui.h" ]; then
              echo "Cloning $url -> $dir"
              rm -rf "$dir"
              git clone --depth 1 "$url" "$dir"
            fi
          done

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          sdk: 10.0.19041.0

      # -- Caching: sccache for compiled objects --------------------------------
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Mozilla\sccache
          key: sccache-${{ runner.os }}-vs2022-${{ matrix.config }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-vs2022-${{ matrix.config }}-
            sccache-${{ runner.os }}-vs2022-

      # -- Caching: NVIDIA packman packages -----------------------------------
      - name: Cache packman packages
        uses: actions/cache@v4
        with:
          path: C:\packman-cache
          key: packman-${{ runner.os }}-${{ hashFiles('external/Falcor/dependencies.xml') }}
          restore-keys: packman-${{ runner.os }}-

      - name: Fetch Falcor packman dependencies
        shell: cmd
        run: |
          cd ${{ env.FALCOR_DIR }}
          call tools\packman\packman.cmd pull --platform windows-x86_64 dependencies.xml

      - name: Integrate MLVHF plugins into Falcor tree
        shell: pwsh
        run: |
          $Falcor = "${{ env.FALCOR_DIR }}"

          # Copy VisHashFilter plugin
          New-Item -ItemType Directory -Path "$Falcor/Source/RenderPasses/VisHashFilter" -Force | Out-Null
          Copy-Item "Source/RenderPasses/VisHashFilter/*" "$Falcor/Source/RenderPasses/VisHashFilter/" -Recurse -Force

          # Copy ReSTIRGIPass plugin
          New-Item -ItemType Directory -Path "$Falcor/Source/RenderPasses/ReSTIRGIPass" -Force | Out-Null
          Copy-Item "Source/RenderPasses/ReSTIRGIPass/*" "$Falcor/Source/RenderPasses/ReSTIRGIPass/" -Recurse -Force

          # Copy scripts
          New-Item -ItemType Directory -Path "$Falcor/scripts/MLVHF" -Force | Out-Null
          Copy-Item "scripts/*" "$Falcor/scripts/MLVHF/" -Recurse -Force

          # Patch RenderPasses CMakeLists.txt
          $rpCmake = "$Falcor/Source/RenderPasses/CMakeLists.txt"
          $content = Get-Content $rpCmake -Raw
          if ($content -notmatch "add_subdirectory\(VisHashFilter\)") {
            Add-Content $rpCmake "`nadd_subdirectory(VisHashFilter)"
          }
          if ($content -notmatch "add_subdirectory\(ReSTIRGIPass\)") {
            Add-Content $rpCmake "`nadd_subdirectory(ReSTIRGIPass)"
          }

          Write-Host "--- Patched RenderPasses CMakeLists.txt ---"
          Get-Content $rpCmake

      - name: CMake Configure
        shell: cmd
        run: |
          cd ${{ env.FALCOR_DIR }}
          tools\.packman\cmake\bin\cmake.exe --preset %CMAKE_BUILD_PRESET% -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        shell: cmd
        run: |
          cd ${{ env.FALCOR_DIR }}
          tools\.packman\cmake\bin\cmake.exe --build build\%CMAKE_BUILD_PRESET% --config ${{ matrix.config }} -- /m

      - name: Print sccache stats
        if: always()
        shell: cmd
        run: sccache --show-stats

      - name: Upload build artifacts
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: falcor-windows-vs2022-${{ matrix.config }}
          path: |
            ${{ env.FALCOR_DIR }}/build/${{ env.CMAKE_BUILD_PRESET }}/bin/${{ matrix.config }}/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Windows Ninja/MSVC — alternative build path
  # ---------------------------------------------------------------------------
  windows-ninja:
    name: Windows Ninja/MSVC (${{ matrix.config }})
    runs-on: windows-2022
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        config: [Release]
    env:
      CMAKE_BUILD_PRESET: windows-ninja-msvc-ci
      PM_PACKAGES_ROOT: C:\packman-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -- Caching: Falcor internal submodules --------------------------------
      - name: Cache Falcor submodules
        uses: actions/cache@v4
        with:
          path: |
            external/Falcor/external/pybind11
            external/Falcor/external/glfw
            external/Falcor/external/args
            external/Falcor/external/fmt
            external/Falcor/external/imgui
            external/Falcor/external/vulkan-headers
          key: falcor-submodules-${{ runner.os }}-v1

      - name: Init Falcor submodules
        shell: bash
        run: |
          cd ${{ env.FALCOR_DIR }}
          for mod in pybind11:https://github.com/skallweitNV/pybind11.git \
                     glfw:https://github.com/glfw/glfw.git \
                     args:https://github.com/Taywee/args.git \
                     fmt:https://github.com/fmtlib/fmt.git \
                     imgui:https://github.com/ocornut/imgui.git \
                     vulkan-headers:https://github.com/KhronosGroup/Vulkan-Headers.git; do
            dir="external/${mod%%:*}"
            url="${mod#*:}"
            if [ ! -f "$dir/CMakeLists.txt" ] && [ ! -f "$dir/imgui.h" ]; then
              echo "Cloning $url -> $dir"
              rm -rf "$dir"
              git clone --depth 1 "$url" "$dir"
            fi
          done

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          sdk: 10.0.19041.0

      # -- Caching: sccache for compiled objects --------------------------------
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Mozilla\sccache
          key: sccache-${{ runner.os }}-ninja-${{ matrix.config }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ runner.os }}-ninja-${{ matrix.config }}-
            sccache-${{ runner.os }}-ninja-

      # -- Caching: NVIDIA packman packages -----------------------------------
      - name: Cache packman packages
        uses: actions/cache@v4
        with:
          path: C:\packman-cache
          key: packman-${{ runner.os }}-${{ hashFiles('external/Falcor/dependencies.xml') }}
          restore-keys: packman-${{ runner.os }}-

      - name: Fetch Falcor packman dependencies
        shell: cmd
        run: |
          cd ${{ env.FALCOR_DIR }}
          call tools\packman\packman.cmd pull --platform windows-x86_64 dependencies.xml

      - name: Integrate MLVHF plugins into Falcor tree
        shell: pwsh
        run: |
          $Falcor = "${{ env.FALCOR_DIR }}"

          New-Item -ItemType Directory -Path "$Falcor/Source/RenderPasses/VisHashFilter" -Force | Out-Null
          Copy-Item "Source/RenderPasses/VisHashFilter/*" "$Falcor/Source/RenderPasses/VisHashFilter/" -Recurse -Force

          New-Item -ItemType Directory -Path "$Falcor/Source/RenderPasses/ReSTIRGIPass" -Force | Out-Null
          Copy-Item "Source/RenderPasses/ReSTIRGIPass/*" "$Falcor/Source/RenderPasses/ReSTIRGIPass/" -Recurse -Force

          New-Item -ItemType Directory -Path "$Falcor/scripts/MLVHF" -Force | Out-Null
          Copy-Item "scripts/*" "$Falcor/scripts/MLVHF/" -Recurse -Force

          $rpCmake = "$Falcor/Source/RenderPasses/CMakeLists.txt"
          $content = Get-Content $rpCmake -Raw
          if ($content -notmatch "add_subdirectory\(VisHashFilter\)") {
            Add-Content $rpCmake "`nadd_subdirectory(VisHashFilter)"
          }
          if ($content -notmatch "add_subdirectory\(ReSTIRGIPass\)") {
            Add-Content $rpCmake "`nadd_subdirectory(ReSTIRGIPass)"
          }

      - name: CMake Configure
        shell: cmd
        run: |
          cd ${{ env.FALCOR_DIR }}
          tools\.packman\cmake\bin\cmake.exe --preset %CMAKE_BUILD_PRESET% -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        shell: cmd
        run: |
          cd ${{ env.FALCOR_DIR }}
          tools\.packman\cmake\bin\cmake.exe --build build\%CMAKE_BUILD_PRESET% --config ${{ matrix.config }}

      - name: Print sccache stats
        if: always()
        shell: cmd
        run: sccache --show-stats

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: falcor-windows-ninja-${{ matrix.config }}
          path: |
            ${{ env.FALCOR_DIR }}/build/${{ env.CMAKE_BUILD_PRESET }}/bin/${{ matrix.config }}/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Release — triggered on v* tags after successful builds
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [unit-tests, linux-gcc, windows-vs2022, windows-ninja]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Package release archives
        run: |
          cd release-artifacts
          for dir in */; do
            name="${dir%/}"
            echo "Packaging ${name}..."
            tar -czf "../${name}.tar.gz" -C "$dir" .
          done
          ls -lh ../*.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.tar.gz"
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

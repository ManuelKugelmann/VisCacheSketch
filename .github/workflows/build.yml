        uses: actions/cache@v4
        with:
          path: |
            .git/modules/Falcor
            Falcor/external/pybind11
            Falcor/external/glfw
            Falcor/external/args
            Falcor/external/fmt
            Falcor/external/imgui
            Falcor/external/vulkan-headers
          key: falcor-submodules-${{ runner.os }}-v3
          restore-keys: falcor-submodules-

      - name: Init Falcor submodules
        shell: bash
        run: |
          for sub in Falcor/external/pybind11 Falcor/external/glfw Falcor/external/args Falcor/external/fmt Falcor/external/imgui Falcor/external/vulkan-headers; do
            if [ -d "$sub" ] && [ ! -f "$sub/.git" ]; then
              rm -rf "$sub"
            fi
          done
          git submodule update --init --depth 1

      # -- Caching: NVIDIA packman packages -----------------------------------
      - name: Cache packman packages
        uses: actions/cache@v4
        with:
          path: C:\packman-cache
          key: packman-${{ runner.os }}-${{ hashFiles('Falcor/dependencies.xml') }}
          restore-keys: packman-

      - name: Fetch Falcor packman dependencies
        shell: cmd
        run: |
          cd ${{ env.FALCOR_DIR }}
          call tools\packman\packman.cmd pull --platform windows-x86_64 dependencies.xml

      - name: Integrate VisCache plugins into Falcor tree
        shell: pwsh
        run: |
          $Falcor = "${{ env.FALCOR_DIR }}"

          New-Item -ItemType Directory -Path "$Falcor/Source/RenderPasses/VisCache" -Force | Out-Null
          Copy-Item "Source/RenderPasses/VisCache/*" "$Falcor/Source/RenderPasses/VisCache/" -Recurse -Force

          New-Item -ItemType Directory -Path "$Falcor/Source/RenderPasses/ReSTIRGIPass" -Force | Out-Null
          Copy-Item "Source/RenderPasses/ReSTIRGIPass/*" "$Falcor/Source/RenderPasses/ReSTIRGIPass/" -Recurse -Force

          New-Item -ItemType Directory -Path "$Falcor/scripts/VisCache" -Force | Out-Null
          Copy-Item "scripts/*" "$Falcor/scripts/VisCache/" -Recurse -Force

          $rpCmake = "$Falcor/Source/RenderPasses/CMakeLists.txt"
          $content = Get-Content $rpCmake -Raw
          if ($content -notmatch "add_subdirectory\(VisCache\)") {
            Add-Content $rpCmake "`nadd_subdirectory(VisCache)"
          }
          if ($content -notmatch "add_subdirectory\(ReSTIRGIPass\)") {
            Add-Content $rpCmake "`nadd_subdirectory(ReSTIRGIPass)"
          }

          # ------------------------------------------------------------------
          # Patch external/CMakeLists.txt to silence upstream build warnings.
          # These are Falcor-internal issues (not VisCache code) that we fix
          # at CI time to keep the Falcor subtree vanilla.
          # ------------------------------------------------------------------
          $extCmake = "$Falcor/external/CMakeLists.txt"
          $extContent = Get-Content $extCmake -Raw

          # C4996: fmt uses deprecated stdext::checked_array_iterator (MSVC 14.44+)
          if ($extContent -notmatch "_SILENCE_STDEXT_ARR_ITERS_DEPRECATION_WARNING") {
            Add-Content $extCmake "`ntarget_compile_definitions(fmt PRIVATE _SILENCE_STDEXT_ARR_ITERS_DEPRECATION_WARNING)"
          }

          # TBB deprecation: OpenVDB pulls in tbb/task.h which TBB marks deprecated.
          # TBB_SUPPRESS_DEPRECATED_MESSAGES silences the runtime/compile-time banner.
          if ($extContent -notmatch "TBB_SUPPRESS_DEPRECATED_MESSAGES") {
            Add-Content $extCmake "`ntarget_compile_definitions(tbb INTERFACE TBB_SUPPRESS_DEPRECATED_MESSAGES=1)"
          }

          # ------------------------------------------------------------------
          # Patch Falcor linker flags for Debug builds.
          # ------------------------------------------------------------------
          $falcorCmake = "$Falcor/Source/Falcor/CMakeLists.txt"
          $falcorContent = Get-Content $falcorCmake -Raw

          # LNK4098: Falcor intentionally uses release-built libs (assimp, lz4, zlib)
          # in Debug for performance, which links MSVCRT (release CRT) alongside
          # MSVCRTd (debug CRT). Tell the linker to ignore the release CRT in Debug.
          if ($falcorContent -notmatch "NODEFAULTLIB:MSVCRT") {
            $falcorContent = $falcorContent -replace `
              '(target_link_options\(Falcor\s+PUBLIC\s+# MSVC flags\.)', `
              "`$1`n        `$<`$<AND:`$<CXX_COMPILER_ID:MSVC>,`$<CONFIG:Debug>>:/NODEFAULTLIB:MSVCRT>"
            Set-Content $falcorCmake $falcorContent -NoNewline
          }

          # ------------------------------------------------------------------
          # Strip CI path prefix from diagnostics and PDB source paths.
          # Uses add_compile_options() to preserve CMake's default /EHsc etc.
          # ------------------------------------------------------------------
          $rootCmake = "$Falcor/CMakeLists.txt"
          $rootContent = Get-Content $rootCmake -Raw
          $trimPath = (Resolve-Path $Falcor).Path -replace '\\','/'
          if ($rootContent -notmatch "d1trimfile") {
            $rootContent = $rootContent -replace `
              '(project\(Falcor[^)]*\))', `
              "`$1`nadd_compile_options(/d1trimfile:$trimPath/)"
            Set-Content $rootCmake $rootContent -NoNewline
          }

      - name: CMake Configure
        shell: cmd
        run: |
          cd ${{ env.FALCOR_DIR }}
          tools\.packman\cmake\bin\cmake.exe --preset %CMAKE_BUILD_PRESET% -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        shell: cmd
        run: |
          cd ${{ env.FALCOR_DIR }}
          tools\.packman\cmake\bin\cmake.exe --build build\%CMAKE_BUILD_PRESET% --config ${{ matrix.config }}

      - name: Print sccache stats
        if: always()
        shell: cmd
        run: sccache --show-stats

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: falcor-windows-ninja-${{ matrix.config }}
          path: |
            ${{ env.FALCOR_DIR }}/build/${{ env.CMAKE_BUILD_PRESET }}/bin/${{ matrix.config }}/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Linux/GCC — optional, does not block PRs or releases (non-PR only)
  # ---------------------------------------------------------------------------
  linux-gcc:
    name: Linux/GCC
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        config: [Release, Debug]
    env:
      CMAKE_BUILD_PRESET: linux-gcc-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Falcor submodules
        uses: actions/cache@v4
        with:
          path: |
            .git/modules/Falcor
            Falcor/external/pybind11
            Falcor/external/glfw
            Falcor/external/args
            Falcor/external/fmt
            Falcor/external/imgui
            Falcor/external/vulkan-headers
          key: falcor-submodules-${{ runner.os }}-v3
          restore-keys: falcor-submodules-

      - name: Init Falcor submodules
        run: |
          for sub in Falcor/external/pybind11 Falcor/external/glfw Falcor/external/args Falcor/external/fmt Falcor/external/imgui Falcor/external/vulkan-headers; do
            if [ -d "$sub" ] && [ ! -f "$sub/.git" ]; then
              rm -rf "$sub"
            fi
          done
          git submodule update --init --depth 1

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xorg-dev libgtk-3-dev ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-gcc-${{ matrix.config }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-gcc-${{ matrix.config }}-
            ccache-${{ runner.os }}-gcc-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=1G
          ccache --set-config=compression=true
          ccache -z

      - name: Cache packman packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/packman
          key: packman-${{ runner.os }}-${{ hashFiles('Falcor/dependencies.xml') }}
          restore-keys: packman-

      - name: Fetch Falcor packman dependencies
        run: |
          cd ${{ env.FALCOR_DIR }}
          chmod +x tools/packman/packman
          ./tools/packman/packman pull --platform linux-x86_64 dependencies.xml

      - name: Patch NVTT package
        run: |
          cd ${{ env.FALCOR_DIR }}
          cp -fp external/packman/nvtt/libnvtt.so.30106 external/packman/nvtt/libnvtt.so

      - name: Integrate VisCache plugins into Falcor tree
        run: |
          FALCOR="${{ env.FALCOR_DIR }}"
          mkdir -p "${FALCOR}/Source/RenderPasses/VisCache"
          cp -r Source/RenderPasses/VisCache/* "${FALCOR}/Source/RenderPasses/VisCache/"
          mkdir -p "${FALCOR}/Source/RenderPasses/ReSTIRGIPass"
          cp -r Source/RenderPasses/ReSTIRGIPass/* "${FALCOR}/Source/RenderPasses/ReSTIRGIPass/"
          mkdir -p "${FALCOR}/scripts/VisCache"
          cp -r scripts/* "${FALCOR}/scripts/VisCache/"
          RP_CMAKE="${FALCOR}/Source/RenderPasses/CMakeLists.txt"
          if ! grep -q "add_subdirectory(VisCache)" "$RP_CMAKE"; then
            echo "add_subdirectory(VisCache)" >> "$RP_CMAKE"
          fi
          if ! grep -q "add_subdirectory(ReSTIRGIPass)" "$RP_CMAKE"; then
            echo "add_subdirectory(ReSTIRGIPass)" >> "$RP_CMAKE"
          fi

      - name: CMake Configure
        run: |
          cd ${{ env.FALCOR_DIR }}
          SRCDIR="$(pwd)"
          ./tools/.packman/cmake/bin/cmake --preset ${{ env.CMAKE_BUILD_PRESET }} \
            -DFALCOR_VALIDATE_HEADERS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            "-DCMAKE_C_FLAGS=-ffile-prefix-map=${SRCDIR}/=" \
            "-DCMAKE_CXX_FLAGS=-ffile-prefix-map=${SRCDIR}/="

      - name: Build
        run: |
          cd ${{ env.FALCOR_DIR }}
          ./tools/.packman/cmake/bin/cmake --build build/${{ env.CMAKE_BUILD_PRESET }} --config ${{ matrix.config }} -j $(nproc)

      - name: Print ccache stats
        if: always()
        run: ccache -s

  # ---------------------------------------------------------------------------
  # Release — triggered on v* tags after successful builds
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows-vs2022, windows-ninja]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Package release archives
        run: |
          cd release-artifacts
          for dir in */; do
            name="${dir%/}"
            echo "Packaging ${name}..."
            tar -czf "../${name}.tar.gz" -C "$dir" .
          done
          ls -lh ../*.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.tar.gz"
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
